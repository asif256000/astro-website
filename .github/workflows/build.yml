name: Build Astro Website

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'profile.db'
      - 'package.json'
      - 'astro.config.mjs'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Global DB and Static Site
        run: npm run build
